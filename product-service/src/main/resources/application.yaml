spring:
  application:
    name: product-service
  threads:
    virtual:
      enabled: true
  mongodb:

    # uri original de mongo para spring-boot
    # uri: mongodb://root:password@localhost:27017/product-db?authSource=admin

    # construye el uri desde la clase MongoConfig
    host: ${MONGO_HOST:localhost}
    port: ${MONGO_PORT:27017}
    database: ${MONGO_DATABASE:product-db}
    username: ${MONGO_USERNAME}
    password: ${MONGO_PASSWORD}
    authentication-database: ${MONGO_AUTH_DB:admin}
server:
  port: 8080

